<title>Multiple Earthquake Tables</title>
<style>
  body { font-family: Arial, sans-serif; margin: 30px; }
  table { border-collapse: collapse; width: 300px; margin-bottom: 40px; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background-color: #f2f2f2; }
  h2 { margin-top: 40px; }
</style>
</head>
<body>
  <h1>Yearly Count of Earthquakes (≥6.0)</h1>
  <div id="tables"></div>

<script>
async function generateTables() {
  // 🔗 Your JSON data URLs — can be API endpoints or local files
  const urls = [
    "https://earthquake.usgs.gov/fdsnws/event/1/query.geojson?starttime=1980-01-01%2000:00:00&endtime=1989-12-31%2023:59:59&minmagnitude=6&maxmagnitude=9.5&orderby=time",
    "https://earthquake.usgs.gov/fdsnws/event/1/query.geojson?starttime=1990-01-01%2000:00:00&endtime=1999-12-31%2023:59:59&minmagnitude=6&maxmagnitude=9.5&orderby=time",
    "https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2000-01-01&endtime=2025-12-31&minmagnitude=6"
  ];

  const container = document.getElementById("tables");

  // 🌀 Loop through every URL
  for (const url of urls) {
    const response = await fetch(url);
    const data = await response.json();
    const yearlyCounts = {};

    // Group & count quakes by year
    data.features.forEach(eq => {
      const year = new Date(eq.properties.time).getFullYear();
      yearlyCounts[year] = (yearlyCounts[year] || 0) + 1;
    });

    // Build a table for this dataset
    const years = Object.keys(yearlyCounts).sort();
    const tableHTML = `
      <h2>Dataset: ${url}</h2>
      <table>
        <tr><th>Year</th><th>Count</th></tr>
        ${years.map(y => `<tr><td>${y}</td><td>${yearlyCounts[y]}</td></tr>`).join('')}
      </table>
    `;

    container.insertAdjacentHTML("beforeend", tableHTML);
  }
}

generateTables();
</script>
</body>
</html>

// Old EQ feed loader

function loadFeed(url) {
  earthquakesLayerClustered.clearLayers();
  earthquakesLayerPlain.clearLayers();
  cachedData = [];
  fetch(url)
    .then(res => res.json())
    .then(data => {
      cachedData = data.features;
      renderMarkers();
    });
}
